services:
  guia-metrics:
    build:
      context: .
      dockerfile: Dockerfile
    image: guia-mad-bench-metrics-light:latest
    working_dir: /app
    environment:
      TOKENIZERS_PARALLELISM: "false"
      PYTHONWARNINGS: "ignore::FutureWarning"
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /cache/sentence_transformers
    volumes:
      - ../sample_resources:/resources
      - guia_hf_cache:/cache/huggingface
      - guia_sentence_cache:/cache/sentence_transformers

volumes:
  guia_hf_cache:
  guia_sentence_cache:
